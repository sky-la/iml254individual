<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background-image: url("images/background.webp");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .contact-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 70px;
        }

        .contact-icon {
            font-size: 70px;
            color: #f5e6d3;
            text-decoration: none;
            transition: 0.3s;
            filter: drop-shadow(0 0 8px #d8b08c);
        }

        .contact-icon:hover {
            transform: scale(1.15);
            color: #ffffff;
        }
    </style>

</head>

<body>

    <div class="contact-container">

        <!-- Instagram -->
        <a class="contact-icon" href="https://www.instagram.com/skeaylv._" target="_blank">
            <i class="fa-brands fa-instagram"></i>
        </a>


        <!-- Email -->
        <a class="contact-icon" href="mailto:angahhobi@gmail.com">
            <i class="fa-solid fa-envelope"></i>
        </a>

    </div>

<footer>

  <p>© 2026 Nyrr's Website | All Right Reserved.</p>

</footer>

<script src="script.js"></script>

</body>
</html>
